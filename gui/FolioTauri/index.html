<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folio</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: #f8f7f3;
        color: #1d1d1d;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
      }
      input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }
      button {
        margin-top: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #bbb;
        background: #fff;
      }
      pre {
        margin-top: 12px;
        padding: 12px;
        background: #111;
        color: #d3f9d8;
        border-radius: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Folio</h1>
      <p>Minimal Tauri wrapper scaffold</p>
      <input id="query" placeholder='Search query, e.g. "tax return"' />
      <button id="search">Run folio search</button>
      <pre id="output"></pre>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
